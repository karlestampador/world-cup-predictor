name: Generate Stage Snapshots

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Update Match Results"]
    types:
      - completed

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Check tournament date window
        id: date_check
        run: |
          TODAY=$(date -u +%Y%m%d)
          START=20260611
          END=20260720
          if [ "$TODAY" -lt "$START" ] || [ "$TODAY" -gt "$END" ]; then
            echo "Outside tournament window ($TODAY). Exiting early."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Inside tournament window ($TODAY). Proceeding."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        if: steps.date_check.outputs.skip == 'false'
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        if: steps.date_check.outputs.skip == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.date_check.outputs.skip == 'false'
        run: pip install -r requirements.txt

      - name: Generate any newly-ready stage snapshots
        if: steps.date_check.outputs.skip == 'false'
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: python scripts/make_stage_snapshot.py

      - name: Commit and push new snapshots
        if: steps.date_check.outputs.skip == 'false'
        run: |
          git add predictions/snapshots
          if git diff --cached --quiet; then
            echo "No new snapshots — skipping commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "auto: add stage prediction snapshot [skip ci]"
            git push
          fi
